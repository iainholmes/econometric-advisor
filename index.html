                <div style="font-weight:600;font-size:14px;margin-bottom:4px;">Methods Appendix</div>

                <div style="font-weight:600;font-size:14px;margin-bottom:4px;">Reviewer Reference Card</div>

            </button>
        </div>
    </div>
</div>

<script>
function openExportModal() {
    document.getElementById('export-format-modal').style.display = 'flex';
}
function closeExportModal() {
    document.getElementById('export-format-modal').style.display = 'none';
}

function openExportSubmenuLeft(e) {
    e.stopPropagation();
    e.preventDefault();
    
    let existing = document.getElementById('export-submenu');
    if (existing) {
        existing.remove();
        return;
    }
    
    let sub = document.createElement('div');
    sub.id = 'export-submenu';
    sub.style.cssText = 'position: absolute; right: 100%; top: 0; background: #0a1d33; border: .5px solid var(--border); border-radius: 10px; padding: 6px; min-width: 180px; z-index: 201; box-shadow: 0 8px 32px rgba(0,0,0,.4); display: flex; flex-direction: column; gap: 4px;';
    
    sub.innerHTML = `
        <button class="hdr-tools-item" onclick="exportBrief()">Research Design Brief</button>
        <button class="hdr-tools-item" onclick="exportAppendix()">Methods Appendix</button>
        <button class="hdr-tools-item" onclick="exportReviewerCard()">Reviewer Reference Card</button>
    `;
    
    e.currentTarget.parentElement.appendChild(sub);
}

// Close dropdowns cleanly
document.addEventListener('click', function(e) {
    let sub = document.getElementById('export-submenu');
    if (sub && !e.target.closest('#export-submenu')) {
        sub.remove();
    }
});
</script>
</body>
